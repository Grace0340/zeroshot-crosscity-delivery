# Default configuration for zero-shot cross-city delivery demand forecasting.
data:
  lade_dir: data/LaDe_raw/pickup      # LaDe pickup CSVs (see data/README.md)
  processed_dir: data/processed
  cities: [sh, hz, cq, yt, jl]
  year: 2022                # LaDe timestamps lack a year; 2022 is used throughout
  freq: 1h                  # aggregation granularity
  event_time: pickup_time   # demand = hourly pickup counts (same convention as IMPEL)
  input_len: 24
  output_len: 24
  split: [0.6, 0.2, 0.2]    # chronological train/calibration/test split within source cities

experiment:
  protocol: leave_one_city_out   # the target city has zero observations
  target_city: hz                # held-out target (overridable from the command line)
  seed: 0

model:
  hidden_dim: 64
  static_dim: 32            # encoded static-feature width
  llm_emb_path: data/IMPEL  # pre-generated Llama-3 region embeddings (IMPEL pipeline)
  llm_emb_dim: 4096
  tcn_layers: 3
  knn_k: 8                  # kNN graph over node representations
  quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]

train:
  batch_size: 16
  max_epochs: 200
  patience: 15
  lr: 0.001                 # adopted recipe overrides to 5e-4 with clip 1.0 (see scripts/)

conformal:
  alpha: 0.1                # nominal coverage 90%
  tau: 0.1                  # similarity-weight temperature
  min_weight: 0.001         # weight floor to avoid degeneracy

decision:
  cost_ratios: [[1, 1], [1, 3], [3, 1]]   # [overage cost, underage cost]
